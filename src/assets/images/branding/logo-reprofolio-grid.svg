<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" role="img" aria-labelledby="title desc">
  <title id="title">ReproFolio Grid Logo</title>
  <desc id="desc">Grid-inspired icon paired with a high-contrast ReproFolio wordmark.</desc>
  <defs>
    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#d2e6ff"/>
    </linearGradient>
    <linearGradient id="connector" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <g transform="translate(12,12)">
    <rect x="0" y="0" width="96" height="96" rx="22" fill="#f8fbff" stroke="#c2d7f2" stroke-width="2"/>
    <g transform="translate(17,17)">
      <rect x="0" y="0" width="18" height="18" rx="4" fill="#1d4ed8"/>
      <rect x="22" y="0" width="18" height="18" rx="4" fill="#22c55e"/>
      <rect x="44" y="0" width="18" height="18" rx="4" fill="#0ea5e9"/>
      <rect x="0" y="22" width="18" height="18" rx="4" fill="#0ea5e9"/>
      <rect x="22" y="22" width="18" height="18" rx="4" fill="#1d4ed8"/>
      <rect x="44" y="22" width="18" height="18" rx="4" fill="#ff6b35"/>
      <rect x="0" y="44" width="18" height="18" rx="4" fill="#ff6b35"/>
      <rect x="22" y="44" width="18" height="18" rx="4" fill="#22c55e"/>
      <rect x="44" y="44" width="18" height="18" rx="4" fill="#1d4ed8"/>
    </g>
  </g>
  <rect x="120" y="58" width="24" height="4" rx="2" fill="url(#connector)"/>
  <text
    x="154"
    y="75"
    font-family="'Sora', 'Segoe UI', sans-serif"
    font-size="58"
    font-weight="780"
    letter-spacing="-0.5"
    fill="url(#wordmark)"
    stroke="#0f2238"
    stroke-width="2.1"
    paint-order="stroke fill"
  >
    ReproFolio
  </text>
</svg>
